version: "3.9"

services:
  sia-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sia_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      - PYTHONPATH=/app
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sia-train:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sia_training
    command: python train_pipeline.py --skip-advanced
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      - PYTHONPATH=/app
    profiles:
      - train

volumes:
  sia-data:
  sia-models:
  sia-outputs:
